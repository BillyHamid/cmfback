# Stockage S3 local attendu par application.properties (aws.s3.endpoint = http://localhost:9000).
# Démarrage : docker compose -f docker-compose.minio.yml up -d
# Identifiants : admin / changeme123 (identiques à aws.accessKey / aws.secretKey dans application.properties)
# Console MinIO : http://localhost:9001

services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: changeme123
    volumes:
      - finacom_minio_data:/data

  # Crée le bucket « finacomapp » (aws.s3.bucketName) si absent
  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command: -c "until mc alias set local http://minio:9000 admin changeme123 2>/dev/null; do sleep 1; done; mc mb local/finacomapp --ignore-existing; echo OK"
    restart: "no"

volumes:
  finacom_minio_data: {}
