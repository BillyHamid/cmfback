# Profil DEMO - Base H2 en mémoire (aucun PostgreSQL requis)
# Firebase optionnel : firebase.credentials.path=C:/chemin/vers/adminsdk.json
# Fichiers sur disque : pas besoin de MinIO (localhost:9000)
app.storage.mode=local
app.storage.local.directory=${user.home}/.finacom/uploads
app.public.api-base-url=http://localhost:8080

server.port=8080

# Mot de passe fixe pour le compte admin en démo
app.demo.admin.password=admin123
app.demo.commercial.password=commercial123
spring.datasource.url=jdbc:h2:mem:finacom;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
