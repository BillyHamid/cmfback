server.port=8080
spring.application.name=finacom-ws

# Firebase Admin : chemin absolu vers le JSON du compte de service (NE JAMAIS commiter ce fichier)
firebase.credentials.path=

# AWS / MinIO — valeurs par défaut pour démarrer sans .env (demo, CI). En prod : surcharger via variables d'environnement Spring.
aws.ses.access-key=local-dummy
aws.ses.secret-key=local-dummy
aws.access-key=local-dummy
aws.secret-key=local-dummy
aws.s3.endpoint=http://127.0.0.1:9000
aws.s3.region=us-east-1
aws.s3.bucket-name=finacom-local

# SMS (Aqilas / autre) — dummy en local ; en prod : vraies valeurs via env
app.aqilas.token=local-dummy
app.aqilas.url=https://example.com/sms-placeholder
app.aqilas.sender=FINACOM

# URL publique de l'API (liens fichiers, callbacks). Render : https://cmfback.onrender.com — en local : http://localhost:8080
app.public.api-base-url=https://cmfback.onrender.com

# Stockage des pièces : s3 (MinIO sur aws.s3.endpoint) ou local (dossier sur disque)
app.storage.mode=s3

# Profil demo par défaut (H2 en mémoire, pas de PostgreSQL requis)
spring.profiles.active=demo

spring.datasource.url=jdbc:postgresql://localhost:5432/finacom

#configure the username and password of the database
spring.datasource.username=postgres
spring.datasource.password=admin
logging.level.org.springframework.security=DEBUG

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform = org.hibernate.dialect.PostgreSQL94Dialect
spring.jpa.show-sql = false
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.id.new_generator_mappings=false

spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
spring.main.allow-circular-references=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=200KB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=215MB










